<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archivo Institucional - UCV</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-page="archivo">
  <div class="wrapper">
    <header class="main-header navbar navbar-expand navbar-white navbar-light">
      <div class="container-fluid d-flex align-items-center">
        <a href="/" class="navbar-brand ds-navbar-logo"><i class="fas fa-landmark"></i> UCV Archivo</a>
        <span id="current_user_info" class="ds-user-badge ml-3"></span>
        <div class="ml-auto d-flex align-items-center ds-header-actions">
          <a href="/rrhh" class="btn btn-outline-secondary btn-sm mr-2">Ir a RRHH</a>
          <a id="btn_admin_archivo" href="/admin/archivo" class="btn btn-outline-primary btn-sm mr-2">Administración</a>
          <button id="logout_btn" class="btn btn-danger btn-sm">Cerrar sesión</button>
        </div>
      </div>
    </header>
    <div class="content-wrapper">
    <main class="container py-4">
    <div class="mb-4">
      <h2>Archivo Institucional</h2>
      <p class="text-muted">Búsqueda ligera de documentos y expedientes.</p>
    </div>
    <div class="card mb-4">
      <div class="card-body">
        <div class="form-row">
          <div class="form-group col-md-4">
            <label for="search_term">Buscar</label>
            <input id="search_term" class="form-control" placeholder="Título, autor, ubicación...">
          </div>
          <div class="form-group col-md-3">
            <label for="doc_type_selector">Tipología</label>
            <select id="doc_type_selector" class="form-control"><option value="">Todas</option></select>
          </div>
          <div class="form-group col-md-2">
            <label for="date_start">Desde</label>
            <input id="date_start" type="date" class="form-control">
          </div>
          <div class="form-group col-md-2">
            <label for="date_end">Hasta</label>
            <input id="date_end" type="date" class="form-control">
          </div>
          <div class="form-group col-md-1 d-flex align-items-end">
            <button id="search_button" class="btn btn-primary btn-block">Buscar</button>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><strong>Resultados</strong></div>
      <div class="card-body p-0">
        <div id="archivo_results" class="table-responsive"></div>
      </div>
    </div>
  </main>
  </div>
  <script src="/static/page-app.js"></script>
</body>
</html>
