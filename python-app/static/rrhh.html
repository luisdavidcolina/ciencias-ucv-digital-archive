<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RRHH - Archivo Digital UCV</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-page="rrhh">
  <div class="wrapper">
    <header class="main-header navbar navbar-expand navbar-white navbar-light">
      <div class="container-fluid d-flex align-items-center">
        <a href="/" class="navbar-brand ds-navbar-logo"><i class="fas fa-landmark"></i> UCV RRHH</a>
        <span id="current_user_info" class="ds-user-badge ml-3"></span>
        <div class="ml-auto d-flex align-items-center ds-header-actions">
          <a href="/archivo" class="btn btn-outline-secondary btn-sm mr-2">Ir a Archivo</a>
          <a id="btn_admin_rrhh" href="/admin/rrhh" class="btn btn-outline-primary btn-sm mr-2">Administración RRHH</a>
          <button id="logout_btn" class="btn btn-danger btn-sm">Cerrar sesión</button>
        </div>
      </div>
    </header>
    <div class="content-wrapper">
    <main class="container py-4">
    <div class="mb-4">
      <h2>Archivos RRHH</h2>
      <p class="text-muted">Búsqueda rápida de expedientes de personal.</p>
    </div>
    <div class="card mb-4">
      <div class="card-body">
        <div class="form-row">
          <div class="form-group col-md-3">
            <label for="search_term">Buscar</label>
            <input id="search_term" class="form-control" placeholder="Nombre, cédula, cargo...">
          </div>
          <div class="form-group col-md-3">
            <label for="doc_type_selector">Tipología</label>
            <select id="doc_type_selector" class="form-control"><option value="">Todas</option></select>
          </div>
          <div class="form-group col-md-2">
            <label for="people_selector">Persona</label>
            <select id="people_selector" class="form-control"><option value="">Todas</option></select>
          </div>
          <div class="form-group col-md-2">
            <label for="estado_selector">Estado</label>
            <select id="estado_selector" class="form-control"><option value="">Todos</option></select>
          </div>
          <div class="form-group col-md-2 d-flex align-items-end">
            <button id="search_button" class="btn btn-primary btn-block">Buscar</button>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><strong>Resultados</strong></div>
      <div class="card-body p-0">
        <div id="archivo_results" class="table-responsive"></div>
      </div>
    </div>
  </main>
  </div>
  <script src="/static/page-app.js"></script>
</body>
</html>
