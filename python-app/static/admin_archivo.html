<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Archivo - UCV</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-page="admin_archivo">
  <div class="wrapper">
    <header class="main-header navbar navbar-expand navbar-white navbar-light">
      <div class="container-fluid d-flex align-items-center">
        <a href="/archivo" class="navbar-brand ds-navbar-logo"><i class="fas fa-tools"></i> Admin Archivo</a>
        <span id="current_user_info" class="ds-user-badge ml-3"></span>
        <div class="ml-auto d-flex align-items-center ds-header-actions">
          <a href="/admin/rrhh" class="btn btn-outline-secondary btn-sm mr-2">Admin RRHH</a>
          <button id="logout_btn" class="btn btn-danger btn-sm">Cerrar sesión</button>
        </div>
      </div>
    </header>
    <div class="content-wrapper">
    <main class="container py-4">
    <div class="row mb-4">
      <div class="col-md-6">
        <div class="card p-4">
          <h3>Indicadores</h3>
          <div class="row mt-3">
            <div class="col-6 mb-3"><div class="card card-body text-center"><strong id="stat_total_docs">0</strong><div class="text-muted">Documentos</div></div></div>
            <div class="col-6 mb-3"><div class="card card-body text-center"><strong id="stat_categories">0</strong><div class="text-muted">Categorías</div></div></div>
          </div>
          <div class="row">
            <div class="col-6 mb-3"><div class="card card-body text-center"><strong id="stat_users">0</strong><div class="text-muted">Usuarios</div></div></div>
            <div class="col-6 mb-3"><div class="card card-body text-center"><strong id="stat_latest">N/A</strong><div class="text-muted">Último ingreso</div></div></div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card p-4">
          <h3>Nuevo ingreso</h3>
          <form id="admin_submit_form">
            <div class="form-group"><label for="reg_title">Título</label><input id="reg_title" class="form-control" required></div>
            <div class="form-group"><label for="reg_author">Autor</label><input id="reg_author" class="form-control" required></div>
            <div class="form-group"><label for="reg_doc_type">Tipología</label><input id="reg_doc_type" class="form-control" required></div>
            <div class="form-row">
              <div class="form-group col-md-6"><label for="reg_fecha">Fecha</label><input id="reg_fecha" type="date" class="form-control" required></div>
              <div class="form-group col-md-6"><label for="reg_location">Ubicación</label><input id="reg_location" class="form-control" required></div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Guardar</button>
          </form>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><strong>Historial rápido</strong></div>
      <div class="card-body" id="admin_history">Cargando...</div>
    </div>
  </main>
  </div>
  <script src="/static/page-app.js"></script>
</body>
</html>
