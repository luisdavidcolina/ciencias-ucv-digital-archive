<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso - Archivo Digital UCV</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-page="login">
  <div class="ds-login-backdrop" style="display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px;">
    <div class="card p-5 ds-login-card" style="max-width:420px;width:100%;box-shadow:0 12px 30px rgba(0,0,0,0.12);">
      <div style="text-align:center;margin-bottom:24px;">
        <img src="/static/logoblanco.png" alt="UCV" height="64" style="margin-bottom:16px;">
        <h1 style="font-size:1.5rem;margin:0;color:#2b4e72;">Archivo Digital UCV</h1>
        <p class="text-muted" style="font-size:0.95rem;margin-top:8px;">Acceso institucional con seguridad básica</p>
      </div>
      <div class="form-group">
        <label for="login_user">Usuario</label>
        <div class="input-group">
          <div class="input-group-prepend"><span class="input-group-text"><i class="fas fa-user"></i></span></div>
          <input id="login_user" class="form-control" type="text" placeholder="ID de usuario">
        </div>
      </div>
      <div class="form-group">
        <label for="login_pass">Contraseña</label>
        <div class="input-group">
          <div class="input-group-prepend"><span class="input-group-text"><i class="fas fa-key"></i></span></div>
          <input id="login_pass" class="form-control" type="password" placeholder="********">
          <div class="input-group-append">
            <button id="toggle_login_pass" type="button" class="btn btn-outline-secondary"><i class="fas fa-eye-slash"></i></button>
          </div>
        </div>
      </div>
      <button id="login_btn" class="btn btn-primary btn-block" style="font-weight:bold;">Ingresar</button>
      <p class="text-muted" style="margin-top:16px;font-size:0.9rem;">Usuario de prueba: <strong>admin</strong> / Contraseña: <strong>admin</strong></p>
    </div>
  </div>
  <script src="/static/page-app.js"></script>
</body>
</html>
