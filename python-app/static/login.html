<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso - Archivo Digital UCV</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" type="image/x-icon" href="/static/assets/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/assets/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="/static/assets/icons/site.webmanifest">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-page="login">
  <div class="ds-login-backdrop" style="display:flex !important;flex-direction:column !important;justify-content:center !important;align-items:center !important;gap:15px;">
    <div style="text-align:center;width:100%;margin-bottom:5px;">
      <img src="/static/logoblanco.png" height="64px" style="display:block;margin:0 auto;" alt="Logo UCV Blanco">
    </div>
    <div class="card p-5 ds-login-card">
      <div style="text-align:center;width:100%;margin-bottom:10px;">
        <p class="text-muted" style="font-size:0.95rem;margin:0 0 8px;">
          <i class="fas fa-lock" style="color:#2b4e72;margin-right:8px;"></i>
          Intranet Cifrada de Acceso Restringido
        </p>
      </div>
      <div class="form-group" style="text-align:left;width:100%;margin-bottom:20px;position:relative;">
        <label style="font-weight:bold;color:#495057;font-size:0.95rem;margin-bottom:5px;display:block;">Credencial Institucional</label>
        <i class="fas fa-user auth-icon"></i>
        <input type="text" id="login_user" class="form-control" placeholder="ID de Usuario" style="border-radius:25px !important;padding-left:45px !important;height:52px !important;font-size:1.1rem !important;border:1px solid #ced4da !important;width:100% !important;display:block !important;">
      </div>
      <div class="form-group" style="text-align:left;width:100%;margin-bottom:30px;position:relative;">
        <label style="font-weight:bold;color:#495057;font-size:0.95rem;margin-bottom:5px;display:block;">Contraseña</label>
        <i class="fas fa-key auth-icon"></i>
        <div class="ds-password-wrap">
          <input type="password" id="login_pass" class="form-control" placeholder="••••••••" style="border-radius:25px !important;padding-left:45px !important;height:52px !important;font-size:1.1rem !important;border:1px solid #ced4da !important;width:100% !important;display:block !important;">
          <button id="toggle_login_pass" type="button" class="ds-pass-toggle" aria-label="Mostrar contraseña">
            <i class="fas fa-eye-slash"></i>
          </button>
        </div>
        <div id="caps-lock-warning" style="display:none;font-size:0.78rem;color:#856404;margin-top:4px;padding-left:8px;">
          <i class="fas fa-exclamation-triangle"></i> Bloq Mayús activado
        </div>
      </div>
      <div style="width:100%;">
        <button id="login_btn" class="btn w-100" style="background-color:#2b4e72;color:white;border:none;border-radius:25px;padding:12px;font-weight:bold;font-size:1.15rem;box-shadow:0 4px 15px rgba(43,78,114,0.4);">
          <i class="fas fa-sign-in-alt" style="margin-right:8px;"></i> Ingresar
        </button>
        <div id="login-error-msg" class="alert alert-danger mt-3 mb-0 py-2" style="display:none;border-radius:12px;font-size:0.88rem;"></div>
      </div>
    </div>
  </div>
  <script src="/static/page-app.js"></script>
</body>
</html>
